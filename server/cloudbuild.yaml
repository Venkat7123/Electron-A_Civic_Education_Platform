steps:
  # Step 1: Install dependencies and run tests
  - name: "node:20-alpine"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        cd server
        npm ci
        npm test
    id: "run-tests"

  # Step 2: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "asia-south1-docker.pkg.dev/$PROJECT_ID/electron/server:$_COMMIT_SHA"
      - "-t"
      - "asia-south1-docker.pkg.dev/$PROJECT_ID/electron/server:latest"
      - "./server"
    id: "build-image"
    waitFor: ["run-tests"]

  # Step 3: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "asia-south1-docker.pkg.dev/$PROJECT_ID/electron/server"
    id: "push-image"
    waitFor: ["build-image"]

  # Step 4: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "electron-server"
      - "--image=asia-south1-docker.pkg.dev/$PROJECT_ID/electron/server:$_COMMIT_SHA"
      - "--region=asia-south1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest"
      - "--set-env-vars=NODE_ENV=production,USE_SECRET_MANAGER=true,GCP_PROJECT_ID=$PROJECT_ID,CORS_ORIGIN=*"
    id: "deploy-cloud-run"
    waitFor: ["push-image"]

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _COMMIT_SHA: "latest"

timeout: "1200s"
